version: '3.8'

services:

  ms-eureka:
    build: ./ms-eureka
    ports:
      - "8761:8761"
    networks:
      - smartlogix-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  ms-auth:
    build: ./ms-auth
    ports:
      - "8081:8081"
    depends_on:
      ms-eureka:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://ms-eureka:8761/eureka/
    networks:
      - smartlogix-net

  ms-clientes:
    build: ./ms-clientes
    ports:
      - "8082:8082"
    depends_on:
      ms-eureka:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://ms-eureka:8761/eureka/
    networks:
      - smartlogix-net

  ms-inventario:
    build: ./ms-inventario
    ports:
      - "8083:8083"
    depends_on:
      ms-eureka:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://ms-eureka:8761/eureka/
    networks:
      - smartlogix-net

  ms-pedidos:
    build: ./ms-pedidos
    ports:
      - "8084:8084"
    depends_on:
      ms-eureka:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://ms-eureka:8761/eureka/
    networks:
      - smartlogix-net

  ms-gateway:
    build: ./ms-gateway
    ports:
      - "8080:8080"
    depends_on:
      ms-eureka:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://ms-eureka:8761/eureka/
    networks:
      - smartlogix-net

networks:
  smartlogix-net:
    driver: bridge